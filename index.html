<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

  <title>Payment Control JVBP</title>
  <link rel="shortcut icon" href="progress-graph-32.ico" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: 'Sarabun', sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
}
.container { padding:20px; }

.kpi {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}
.value {
  font-size:24px;
  font-weight:bold;
}

canvas {
  background:#1e293b;
  margin-top:20px;
  padding:10px;
  border-radius:12px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#1e293b;
}
th,td {
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}
a {
  color:#38bdf8;
}
</style>
</head>

<body>
<div class="container">

<div class="kpi">
  <div class="card">รวม<div id="total" class="value"></div></div>
  <div class="card">งวดสูงสุด<div id="max" class="value"></div></div>
  <div class="card">เฉลี่ย<div id="avg" class="value"></div></div>
  <div class="card">จำนวนงวด<div id="count" class="value"></div></div>
</div>

<canvas id="lineChart"></canvas>
<canvas id="stackChart"></canvas>

<table id="table"></table>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS3vpwaPecNlZf2UYZMxWwhtvEli8fKMu8-Y0T7polbjWJzDanafkxBiEPY6MoYFXQDGCnEOlP_KCDP/pub?gid=1336324182&single=true&output=csv";

// 🔥 แปลงตัวเลข (กัน comma + "-")
const toNumber = v => {
  if (!v || v === "-") return 0;
  return Number(v.replace(/,/g,"").trim());
};

Papa.parse(URL, {
  download: true,
  complete: function(res) {

    const rows = res.data.slice(1).filter(r => r[0]);

    const labels = rows.map(r => r[0]);

    // ✅ mapping ใหม่ถูกต้อง
    const totalCol = rows.map(r => toNumber(r[12]));
    const jv = rows.map(r => toNumber(r[14]));
    const z1 = rows.map(r => toNumber(r[15]));
    const z2 = rows.map(r => toNumber(r[16]));
    const z3 = rows.map(r => toNumber(r[17]));
    const z4 = rows.map(r => toNumber(r[18]));

    const links = rows.map(r => r[19]);

    // ===== KPI =====
    const total = totalCol.reduce((a,b)=>a+b,0);
    const avg = total / totalCol.length;
    const maxVal = Math.max(...totalCol);
    const maxIndex = totalCol.indexOf(maxVal);

    document.getElementById("total").innerText = total.toLocaleString();
    document.getElementById("avg").innerText = avg.toFixed(0);
    document.getElementById("count").innerText = totalCol.length;
    document.getElementById("max").innerText =
      labels[maxIndex] + " ("+maxVal.toLocaleString()+")";

    // ===== Line =====
    new Chart(document.getElementById("lineChart"), {
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'ยอดรวม',
          data: totalCol,
          tension:0.4
        }]
      }
    });

    // ===== Stack Zone =====
    new Chart(document.getElementById("stackChart"), {
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'JV', data:jv},
          {label:'Zone1', data:z1},
          {label:'Zone2', data:z2},
          {label:'Zone3', data:z3},
          {label:'Zone4', data:z4}
        ]
      },
      options:{
        scales:{x:{stacked:true}, y:{stacked:true}}
      }
    });

    // ===== Table + Click Link =====
    let html = `
      <tr>
        <th>งวด</th>
        <th>รวม</th>
        <th>JV</th>
        <th>Z1</th>
        <th>Z2</th>
        <th>Z3</th>
        <th>Z4</th>
        <th>Link</th>
      </tr>
    `;

    rows.forEach((r,i)=>{
      html += `
      <tr>
        <td>${labels[i]}</td>
        <td>${totalCol[i].toLocaleString()}</td>
        <td>${jv[i].toLocaleString()}</td>
        <td>${z1[i].toLocaleString()}</td>
        <td>${z2[i].toLocaleString()}</td>
        <td>${z3[i].toLocaleString()}</td>
        <td>${z4[i].toLocaleString()}</td>
        <td>
          ${links[i] 
            ? `<a href="${links[i]}" target="_blank">เปิด</a>` 
            : '-'}
        </td>
      </tr>`;
    });

    document.getElementById("table").innerHTML = html;

  }
});

</script>
</body>
</html>
